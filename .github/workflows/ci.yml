name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: subflow
          POSTGRES_PASSWORD: subflow
          POSTGRES_DB: subflow
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U subflow"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://subflow:subflow@localhost:5432/subflow
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: bun install --frozen-lockfile
      - run: bun run lint
      - run: bun run typecheck
      - run: cd apps/api && bun run db:migrate
      - run: bun run test

  image:
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: false
          tags: subflow-api:ci

  infra:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: cd infra && bun install --frozen-lockfile
      - run: cd infra && bun run typecheck
      - run: cd infra && bun run synth --quiet

  # deploy: enabled in subF-5 once the AWS account + OIDC deploy role exist.
  # Assumes the OIDC role (no long-lived keys), pushes the image to ECR and updates
  # the ECS service / runs `cdk deploy`.
